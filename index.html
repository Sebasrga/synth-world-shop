<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synth World Shop</title>
    <link rel="shortcut icon" href="./icon/carro-de-compras-rapido.png" type="image/x-icon">

    <!-- STYLE -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>
    <div class="contenedorPrincipal"><!-- ----------CONTENEDOR MAIN -->
        <header>
            <div class="barraTop">
                <a href="#"><img class="synthworldLogo" src="./media/synthworld-logo.png"
                        alt="Logotipo de Synth World E-Shop"></a>
                <h1>Synth World Shop</h1>

                <div class="menuLogin">
                    <img class="iconoFormato" src="./icon/usuario.png" alt="icono de usuario inicio de sesion">
                    <div>
                        <button class="estiloLogin login" id="login">Login</button>
                    </div>
                    <div>
                        <button class="estiloLogin logout" id="logout">Logout</button>
                    </div>
                </div>
                <div class="menuCarrito">
                    <a class="botonMenu botonDeCarrito" href="./pages/carro.html"><img class="iconoFormato"
                            src="./icon/carrito-de-compras.png" alt="icono de carrito de compras"></a>
                    <a class="botonMenu botonDeCarrito" href="./pages/carro.html">Carrito <span
                            class="cantidadItemsAgregados" id="cantidadItemsAgregados">0</span></a>
                </div>
            </div>
            <nav class="header_navbar">
                <ul class="navbar__menu">
                    <li><button id="todosLosProductos" class="botonMenu botonDeCategoria active efectoEnBoton">Productos
                            disponibles</button></li>
                    <li><button id="Sinterizador"
                            class="botonMenu botonDeCategoria efectoEnBoton">Sintetizadores</button></li>
                    <li><button id="DrumMachines" class="botonMenu botonDeCategoria efectoEnBoton">Drum
                            machines</button></li>
                    <li><button id="Software" class="botonMenu botonDeCategoria efectoEnBoton">Software VST</button>
                    </li>
                    <li><button id="Accesorios" class="botonMenu botonDeCategoria efectoEnBoton">Accesorios</button>
                    </li>
                </ul>
            </nav>
        </header>
        <!-- ----------------------------MAIN -->
        <main>
            <h2 class="tituloMain" id="tituloMain">Todos los productos disponibles!</h2>

            <div id="contenedorDeProductos" class="contenedorDeProductos">

                <!------------------------------------------ PRODUCTO
    <h3>LISTA DE PRODUCTOS JS</h3>
------------------------------------------------------------ FIN DE PRODUCTO -->
            </div>
        </main>
        <!-- ----------------------------FOOTER -->
        <footer>
            <div class="footerContenedor">
                <p class="footerTexto">Todos los derechos reservados © </p>
                <p class="footerTexto">Autor: Seb Lusher</p>
                <a href="http://www.instagram.com" target="_blank">
                    <img class="iconoFormato" src="./icon/instagram.png"
                        alt="logo de acceso a la red social instagram de synth world shop">
                </a>
                <a href="http://www.facebook.com" target="_blank">
                    <img class="iconoFormato" src="./icon/facebook.png"
                        alt="logo de acceso a la red social facebook de synth world shop">
                </a>
                <a href="https://www.linkedin.com/" target="_blank">
                    <img class="iconoFormato" src="./icon/linkedin.png"
                        alt="logo de acceso a la red social linkedin de synth world shop">
                </a>
            </div>
        </footer>
    </div><!-- ----------FIN DE CONTENEDOR MAIN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="./script/script.js"></script>
</body>

</html>
