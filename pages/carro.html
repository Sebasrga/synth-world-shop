<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synth World Shop | Carro de compras</title>
    <link rel="shortcut icon" href="../icon/carrito-de-compras-favorito.png" type="image/x-icon">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="../style/style.css">
</head>

<body>
    <div class="contenedorPrincipal"><!-- ----------CONTENEDOR MAIN -->
        <header>
            <div class="barraTop">
                <a href="../index.html"><img class="synthworldLogo" src="../media/synthworld-logo.png"
                        alt="Logotipo de Synth World E-Shop"></a>
                <a href="../index.html">
                    <h1>Synth World Shop</h1>
                </a>
                <div class="menuLogin menuDesactivado">
                    <img class="iconoFormato" src="../icon/usuario.png" alt="">
                    <p>Login</p>
                    <p>Logout</p>
                </div>
                <div class="menuCarrito menuDesactivado">
                    <a class="botonMenu botonDeCarrito" href="#"><img class="iconoFormato"
                            src="../icon/carrito-de-compras.png" alt=""></a>
                    <a class="botonMenu botonDeCarrito" href="#">Carrito <span class="cantidadItemsAgregados"
                            id="cantidadItemsAgregados">0</span></a>
                </div>
            </div>
            <nav class="header_navbar">
                <ul class="navbar__menu">

                    <li><button class="botonMenu botonDeCategoria avtive efectoEnBoton"><a href="../index.html"><img
                                    src="../icon/deshacer.png" alt=""> Continuar comprando</a></button></li>
                </ul>
            </nav>
        </header>
        <!-- ----------------------------MAIN -->
        <main>
            <h2 class="tituloMain">Carrito</h2>
            <div class="contenedorDeCarrito">

                <div class="carritoVacio carritoVacioMensaje" id="carritoVacio">
                    <p class="carritoMensajito">No has seleccionado ningún item para ser feliz.</p>
                </div>

                <div class="carritoItems carritoInicio" id="carritoItems">

                    <!-- CONTENEDOR DE PRODUCTOS -->

                </div>

                <div class="carritoMenuBottom carritoInicio" id="carritoMenuBottom">
                    <div class="carritoMenuBottom1">
                        <button class="carritoMenuBottomVaciar" id="carritoMenuBottomVaciar">Vaciar Carrito</button>
                    </div>
                    <div class="carritoMenuBottom2">
                        <div class="carritoMenuBottomTotal">
                            <p class="carritoMenuBottomTotalTitulo">Total</p>
                            <p class="totalCompra" id="totalCompra">$3000</p>
                            <button class="carritoMenuBottomFinalizar" id="carritoMenuBottomFinalizar">Finalizar
                                Compra</button>
                        </div>
                    </div>
                </div>
                <p class="carritoCompra carritoInicio carritoMensajito" id="carritoCompra">Compra felizmente realizada
                    con exito.</p>
            </div>
        </main>
        <!-- ----------------------------FOOTER -->
        <footer>
            <div class="footerContenedor">
                <p class="footerTexto">Todos los derechos reservados © </p>
                <p class="footerTexto">Autor: Seb Lusher</p>
                <a href="http://www.instagram.com" target="_blank">
                    <img class="iconoFormato" src="../icon/instagram.png"
                        alt="logo de acceso a la red social instagram de synth world shop">
                </a>
                <a href="http://www.facebook.com" target="_blank">
                    <img class="iconoFormato" src="../icon/facebook.png"
                        alt="logo de acceso a la red social facebook de synth world shop">
                </a>
                <a href="https://www.linkedin.com/" target="_blank">
                    <img class="iconoFormato" src="../icon/linkedin.png"
                        alt="logo de acceso a la red social linkedin de synth world shop">
                </a>
            </div>
        </footer>
    </div><!-- ----------FIN DE CONTENEDOR MAIN -->

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="../script/carro.js"></script>
</body>

</html>
